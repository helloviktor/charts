{{- if and .Values.initScript (not .Values.initScriptConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "postgres.initScriptConfigMapName" . }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
data:
  init.sql: |
    {{- .Values.initScript | nindent 4 }}
{{- end }}
