{{- if .Values.secret.create }}
{{- $env := required "secret.envFile must be set when secret.create=true (use --set-file secret.envFile=path/to/.env)" .Values.secret.envFile }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "linkding.secretName" . }}
  labels:
    {{- include "linkding.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $line := splitList "\n" $env }}
{{- $trimmed := trim $line }}
{{- if and $trimmed (not (hasPrefix "#" $trimmed)) (contains "=" $trimmed) }}
{{- $parts := splitList "=" $trimmed }}
{{- $key := trim (first $parts) }}
{{- $value := trim (join "=" (rest $parts)) }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
{{- end }}
{{- end }}