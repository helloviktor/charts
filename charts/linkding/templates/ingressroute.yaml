{{- if and .Values.ingressRoute.enabled .Values.ingressRoute.host }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "linkding.fullname" . }}
  labels:
    {{- include "linkding.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- toYaml .Values.ingressRoute.entryPoints | nindent 4 }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingressRoute.host }}`){{ if .Values.ingressRoute.path }} && Path(`{{ .Values.ingressRoute.path }}`){{ end }}
      {{- if or .Values.ingressRoute.accessLogs .Values.ingressRoute.metrics .Values.ingressRoute.tracing }}
      observability:
        {{- if .Values.ingressRoute.accessLogs }}
        accessLogs: {{ .Values.ingressRoute.accessLogs }}
        {{- end }}
        {{- if .Values.ingressRoute.metrics }}
        metrics: {{ .Values.ingressRoute.metrics }}
        {{- end }}
        {{- if .Values.ingressRoute.tracing }}
        tracing: {{ .Values.ingressRoute.tracing }}
        {{- end }}
      {{- end }}
      services:
        - kind: Service
          name: {{ include "linkding.fullname" . }}
          passHostHeader: true
          port: {{ .Values.service.port }}
{{- end }}
